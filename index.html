<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Story</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #111; color: white; font-family: 'Pixelify Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
            text-align: center;
        }
        #scene-container {
            width: 450px; height: 600px; border: 4px solid #444; border-radius: 20px;
            position: relative; background-color: #222; 
            display: flex; flex-direction: column; justify-content: center; padding: 30px; box-sizing: border-box;
        }
        #typewriter-text { font-size: 24px; min-height: 120px; margin-bottom: 30px; line-height: 1.4; }
        button { 
            padding: 15px 30px; font-size: 20px; cursor: pointer; 
            background: #2196F3; color: white; border: none; border-radius: 8px;
            font-family: 'Pixelify Sans', sans-serif; font-weight: bold;
        }
        .reset-btn {
            position: absolute; bottom: 10px; font-size: 12px; background: none; color: #555; box-shadow: none;
        }
    </style>
</head>
<body>

    <div id="scene-container">
        <div id="scene-title" style="font-size: 18px; color: #888; margin-bottom: 10px;"></div>
        <div id="typewriter-text"></div>
        <button id="action-btn" onclick="handleAction()">CONTINUE</button>
        
        <!-- Small button to restart from Scene 1 for testing -->
        <button class="reset-btn" onclick="resetStory()">Restart Story</button>
    </div>

    <script>
        const textElement = document.getElementById('typewriter-text');
        const titleElement = document.getElementById('scene-title');
        const btn = document.getElementById('action-btn');

        // 1. DATA: Define your scenes here
        const scenes = {
            1: {
                title: "SCENE 1: THE WAKE UP",
                text: "BRRRRING! The alarm clock is screaming. You see a note on the bedside table. You need to get ready fast!",
                btnText: "START CATCHING",
                action: () => { jumpToGame(2); } // Save that we should be on Scene 2 next
            },
            2: {
                title: "SCENE 2: THE DISCOVERY",
                text: "Great job! But wait... where is your wallet? You can't leave without it. Check the laundry room!",
                btnText: "FIND WALLET",
                action: () => { jumpToGame(3); } // Save that we should be on Scene 3 next
            },
            3: {
                title: "SCENE 3: THE END",
                text: "You have everything! The sun is shining, and you are officially ready. You win!",
                btnText: "FINISH",
                action: () => { alert("Game Over! Thanks for playing."); resetStory(); }
            }
        };

        // 2. LOGIC: Check where we left off
        // We look in 'localStorage' for 'savedScene'. If nothing is there, start at 1.
        let currentScene = parseInt(localStorage.getItem('savedScene')) || 1;

        function typeWriter(text, i = 0) {
            if (i < text.length) {
                textElement.innerHTML += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 40);
            } else {
                btn.style.visibility = "visible";
            }
        }

        function loadScene(sceneId) {
            const scene = scenes[sceneId];
            titleElement.innerText = scene.title;
            textElement.innerHTML = "";
            btn.innerText = scene.btnText;
            btn.style.visibility = "hidden";
            typeWriter(scene.text);
        }

        function jumpToGame(nextSceneId) {
            // Save the NEXT scene number before leaving the page
            localStorage.setItem('savedScene', nextSceneId);
            window.location.href = "sample_game.html";
        }

        function handleAction() {
            scenes[currentScene].action();
        }

        function resetStory() {
            localStorage.removeItem('savedScene');
            location.reload();
        }

        // Start the page on the correct scene
        loadScene(currentScene);
    </script>
</body>
</html>
