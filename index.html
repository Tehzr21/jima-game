<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Recall - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        #start-screen { position: absolute; width: 400px; height: 650px; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; color: white; text-align: center; border-radius: 15px; padding: 20px; box-sizing: border-box; }
        button { padding: 15px 40px; font-size: 18px; cursor: pointer; background: #0984e3; color: white; border: none; border-radius: 50px; margin-top: 20px; font-weight: bold; }
        canvas { border-radius: 15px; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="color: #74b9ff;">SOCIAL RECALL</h1>
    <p>Press start to begin conversation</p>
    <button id="start-button">START GAME</button>
</div>

<script>
// --- CONFIGURABLE PATHS ---
const PATH_BGM         = 'Asset/Audio/bgm1.ogg';
const PATH_IMG_FRIEND_A = 'Asset/Image/wani.webp'; 
const PATH_IMG_FRIEND_B = 'Asset/Image/nat.webp';

const PATH_SFX_SQ1 = 'Asset/Audio/sq1.ogg';
const PATH_SFX_SQ2 = 'Asset/Audio/sq2.ogg';
const PATH_SFX_SQ3 = 'Asset/Audio/sq3.ogg';
const PATH_SFX_SQ4 = 'Asset/Audio/sq4.ogg';
const PATH_SFX_FAIL     = 'Asset/Audio/wrong.ogg';    
const PATH_SFX_GAMEOVER = 'Asset/Audio/gameover.ogg'; 

// --- NATIVE PRELOAD (Like Item Catch) ---
[PATH_IMG_FRIEND_A, PATH_IMG_FRIEND_B].forEach(src => {
    const img = new Image();
    img.src = src;
});

const DIALOGUES = [
    { speaker: 'A', text: "Lapar ni. Jom pi makan.", targetReply: "Jom! Aku pun tak makan lagi.", failReply: "Sapa suruh kamu tak makan tadi.", patternLen: 3, speed: 800, audioPath: 'Asset/Audio/dialog1.ogg' },
    { speaker: 'B', text: "Nak makan kat mano?", targetReply: "Mana2 pun boleh je.", failReply: "Taknak la, nak diet.", patternLen: 3, speed: 700, audioPath: 'Asset/Audio/dialog2.ogg' },
    { speaker: 'A', text: "Lepas makan, jom tengok wayang.", targetReply: "Boleh! Lama tak masuk cinema.", failReply: "Taknak, bazir masa aku.", patternLen: 4, speed: 650, audioPath: 'Asset/Audio/dialog3.ogg' },
    { speaker: 'B', text: "Lepas tu, nak pi mano?", targetReply: "Aku tau satu tempat cantik.", failReply: "Nanti aku perlu balik company.", patternLen: 4, speed: 600, audioPath: 'Asset/Audio/dialog4.ogg' },
    { speaker: 'A', text: "Ada apa kat situ?", targetReply: "Ada kucing ada pantai.", failReply: "Saja nak OT.", patternLen: 5, speed: 500, audioPath: 'Asset/Audio/dialog5.ogg' },
    { speaker: 'B', text: "Macam syiok", targetReply: "Tak tipu. Jom ah nanti.", failReply: "Mestila, gaji lagi penting.", patternLen: 5, speed: 450, audioPath: 'Asset/Audio/dialog6.ogg' }
];

const bgmAudio = new Audio(PATH_BGM);
bgmAudio.loop = true;
bgmAudio.volume = 0.1;

const squareSFX = [new Audio(PATH_SFX_SQ1), new Audio(PATH_SFX_SQ2), new Audio(PATH_SFX_SQ3), new Audio(PATH_SFX_SQ4)];
const sfxFail = new Audio(PATH_SFX_FAIL);
const sfxGameOver = new Audio(PATH_SFX_GAMEOVER);

let dialogueAudio = null;

const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 650,
    backgroundColor: '#2d3436',
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let currentRound = 0, awkwardScore = 0, sequence = [], playerInputs = [], gameState = 'IDLE'; 
let firstHitTime = 0, timeoutTimer = null, friendA, friendB;

document.getElementById('start-button').addEventListener('click', function() {
    bgmAudio.play().catch(e => console.log("Audio Error"));
    document.getElementById('start-screen').style.display = 'none';
    const mainScene = game.scene.scenes[0];
    if (mainScene) mainScene.nextRound();
});

function preload() {
    // Load using Phaser's loader, but we use the exact paths
    this.load.image('wani', PATH_IMG_FRIEND_A);
    this.load.image('nat', PATH_IMG_FRIEND_B);
}

function create() {
    // FRIEND A
    friendA = this.add.container(100, 100);
    let circleA = this.add.circle(0, 0, 40, 0x74b9ff);
    let imgA = this.add.image(0, 0, 'wani').setDisplaySize(80, 80);
    
    // Improved Masking
    let shapeA = this.make.graphics();
    shapeA.fillCircle(100, 100, 40);
    imgA.setMask(shapeA.createGeometryMask());
    
    friendA.add([circleA, imgA, this.add.text(0, 55, "WANI", {fontSize:'12px', fontStyle:'bold'}).setOrigin(0.5)]);
    
    // FRIEND B
    friendB = this.add.container(300, 100);
    let circleB = this.add.circle(0, 0, 40, 0xa29bfe);
    let imgB = this.add.image(0, 0, 'nat').setDisplaySize(80, 80);
    
    let shapeB = this.make.graphics();
    shapeB.fillCircle(300, 100, 40);
    imgB.setMask(shapeB.createGeometryMask());
    
    friendB.add([circleB, imgB, this.add.text(0, 55, "NAT", {fontSize:'12px', fontStyle:'bold'}).setOrigin(0.5)]);

    this.bubble = this.add.rectangle(200, 275, 350, 130, 0x000000, 0.5).setStrokeStyle(2, 0x74b9ff);
    this.chatText = this.add.text(200, 245, "", { fontSize: '18px', align: 'center', wordWrap: { width: 320 } }).setOrigin(0.5);
    this.replyPrompt = this.add.text(200, 285, "", { fontSize: '14px', color: '#55efc4', fontStyle: 'bold', wordWrap: { width: 320 }, align: 'center' }).setOrigin(0.5);
    this.statusText = this.add.text(200, 320, "", { fontSize: '12px', color: '#ffffff' }).setOrigin(0.5);
    this.awkwardFill = this.add.rectangle(50, 30, 0, 10, 0xff7675).setOrigin(0, 0.5);
    this.add.rectangle(200, 30, 300, 10).setStrokeStyle(1, 0xffffff);

    this.squares = [];
    const colors = [0x55efc4, 0x81ecec, 0x74b9ff, 0xa29bfe];
    const positions = [{x:120, y:435}, {x:280, y:435}, {x:120, y:565}, {x:280, y:565}];
    for(let i=0; i<4; i++) {
        let sq = this.add.rectangle(positions[i].x, positions[i].y, 140, 110, colors[i]);
        sq.setInteractive().id = i + 1;
        sq.on('pointerdown', () => handleInput.call(this, sq.id));
        this.squares.push(sq);
    }
}

Phaser.Scene.prototype.nextRound = function() {
    if (currentRound >= DIALOGUES.length) {
        this.chatText.setText("CONVERSATION COMPLETE!");
        this.replyPrompt.setText("");
        bgmAudio.pause();
        return;
    }
    gameState = 'DIALOGUE';
    let data = DIALOGUES[currentRound];
    updateScale(data.speaker);
    this.chatText.setText(data.text);
    this.statusText.setText("");
    this.replyPrompt.setText("");

    if (dialogueAudio) { dialogueAudio.pause(); }
    dialogueAudio = new Audio(data.audioPath);
    dialogueAudio.play().catch(e => {});

    this.time.delayedCall(2200, () => {
        this.replyPrompt.setText(`Let's reply: "${data.targetReply}"`);
        this.time.delayedCall(1800, () => { this.runExample(); });
    });
};

Phaser.Scene.prototype.runExample = function() {
    gameState = 'CALL';
    sequence = []; playerInputs = [];
    let data = DIALOGUES[currentRound];
    this.statusText.setText("Listen to the tempo...");
    let totalDelay = 500;
    for(let i=0; i < data.patternLen; i++) {
        let id = Phaser.Math.Between(1, 4);
        let interval = (i === 0) ? 0 : data.speed;
        totalDelay += interval;
        sequence.push({ id, interval });
        this.time.delayedCall(totalDelay, () => {
            flashSquare.call(this, id);
            if (i === (data.patternLen - 1)) {
                this.time.delayedCall(800, () => {
                    gameState = 'RESPONSE';
                    this.statusText.setText("GO!");
                    timeoutTimer = this.time.delayedCall(4000, () => {
                        if (playerInputs.length === 0 && gameState === 'RESPONSE') resolveRound.call(this, false, "TOO SLOW!");
                    });
                });
            }
        });
    }
};

function handleInput(id) {
    if (gameState !== 'RESPONSE') return;
    const now = this.time.now;
    flashSquare.call(this, id);

    if (playerInputs.length === 0) {
        if (timeoutTimer) timeoutTimer.remove();
        if (id === sequence[0].id) {
            firstHitTime = now;
            playerInputs.push({ id, time: now });
        } else {
            resolveRound.call(this, false, "WRONG START!");
        }
        return;
    }

    let idx = playerInputs.length;
    let expected = sequence[idx];
    let targetTime = 0;
    for (let i = 1; i <= idx; i++) targetTime += sequence[i].interval;

    if (id === expected.id && Math.abs((now - firstHitTime) - targetTime) <= 300) {
        playerInputs.push({ id, time: now });
        if (playerInputs.length === sequence.length) resolveRound.call(this, true, "PERFECT!");
    } else {
        resolveRound.call(this, false, "WRONG!");
    }
}

function resolveRound(success, msg) {
    gameState = 'IDLE';
    if (timeoutTimer) timeoutTimer.remove();
    let data = DIALOGUES[currentRound];
    this.statusText.setText(msg);

    if (!success) {
        sfxFail.currentTime = 0;
        sfxFail.play().catch(e => {});
        awkwardScore += 34; 
        this.awkwardFill.width = Math.min((awkwardScore / 100) * 300, 300);
        this.replyPrompt.setText(`You: "${data.failReply}"`).setColor('#ff7675');
        this.cameras.main.shake(200, 0.005);
    } 

    currentRound++;
    this.time.delayedCall(2500, () => {
        if (awkwardScore >= 100) {
            bgmAudio.pause();
            sfxGameOver.play().catch(e => {});
            this.chatText.setText("GAME OVER: TOO AWKWARD");
            this.replyPrompt.setText("");
            this.time.delayedCall(4000, () => location.reload());
        } else {
            this.replyPrompt.setColor('#55efc4');
            this.nextRound();
        }
    });
}

function flashSquare(id) {
    let sq = this.squares[id-1];
    if(!sq) return;
    sq.setAlpha(0.5);
    let sfx = squareSFX[id-1];
    sfx.currentTime = 0; 
    sfx.play().catch(e => {});
    game.scene.scenes[0].time.delayedCall(150, () => sq.setAlpha(1));
}

function updateScale(speaker) {
    const scene = game.scene.scenes[0];
    scene.tweens.add({ targets: friendA, scale: speaker === 'A' ? 1.3 : 0.8, alpha: speaker === 'A' ? 1 : 0.4, duration: 300 });
    scene.tweens.add({ targets: friendB, scale: speaker === 'B' ? 1.3 : 0.8, alpha: speaker === 'B' ? 1 : 0.4, duration: 300 });
}

function update() {}
</script>
</body>
</html>
