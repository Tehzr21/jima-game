<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #222; color: white; font-family: 'Pixelify Sans', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        #game-status { font-size: 32px; margin-bottom: 20px; }
        button { 
            padding: 15px 30px; font-size: 20px; cursor: pointer; 
            background: #4CAF50; color: white; border: none; border-radius: 8px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="game-status">Game in Progress...</div>
    
    <!-- This button only appears when the "game" is finished -->
    <button id="next-btn" class="hidden" onclick="goToStory()">BACK TO STORY</button>

    <script>
        // Simulate a 3-second game
        setTimeout(() => {
            document.getElementById('game-status').innerText = "Game Finished!";
            document.getElementById('next-btn').classList.remove('hidden');
        }, 3000);

        function goToStory() {
            // This sends the user back to the story page
            window.location.href = "story.html";
        }
    </script>
</body>
</html>
